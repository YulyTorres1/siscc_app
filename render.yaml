services:
  - type: web
    name: siscc-app
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn 'app:create_app()'"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: siscc-db
          property: connectionString

databases:
  - name: siscc-db
    plan: free
