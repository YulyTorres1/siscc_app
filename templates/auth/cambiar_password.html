{% extends 'base.html' %}
{% block title %}Cambiar contraseña{% endblock %}
{% block page_title %}Cambiar contraseña{% endblock %}
{% block content %}
<div style="max-width:440px; margin:0 auto;">
  <div class="card">
    <div class="card-header">
      <span class="card-title">Cambiar contraseña</span>
    </div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Contraseña actual</label>
        <input type="password" name="password_actual" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">Nueva contraseña</label>
        <input type="password" name="password_nueva" class="form-control" minlength="8" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar nueva contraseña</label>
        <input type="password" name="confirmar" class="form-control" required>
      </div>
      <div style="display:flex; gap:10px; margin-top:8px;">
        <button type="submit" class="btn btn-primary">Actualizar contraseña</button>
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
